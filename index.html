<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touch me - Uncolour</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 1.8rem;
      text-align: center;
    }

    p {
      margin-top: 0;
      text-align: center;
    }

    .game-container {
      position: relative;
      width: min(90vw, 900px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      background: #ddd;
      touch-action: none;
      user-select: none;
    }

    .game-container img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    #coverCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #d00000;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #a80000;
    }
  </style>
</head>
<body>

  <h1>Touch me - Uncolour</h1>
  <p>Wische über die rote Fläche, um das Bild freizulegen.</p>

  <div class="game-container" id="gameContainer">
    <!-- Ersetze bild.jpg durch dein eigenes Bild -->
    <img id="hiddenImage" src="bild.jpg" alt="Verstecktes Bild" />
    <canvas id="coverCanvas"></canvas>
  </div>

  <div id="status">Freigelegt: 0 %</div>

  <button onclick="resetGame()">Neu starten</button>

  <script>
    const canvas = document.getElementById("coverCanvas");
    const ctx = canvas.getContext("2d");
    const image = document.getElementById("hiddenImage");
    const container = document.getElementById("gameContainer");
    const statusText = document.getElementById("status");

    let isDrawing = false;
    let isFinished = false;
    let eraseRadius = 38;
    let checkTimer = null;

    function setupCanvas() {
      const rect = container.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "red";
      ctx.fillRect(0, 0, rect.width, rect.height);

      statusText.textContent = "Freigelegt: 0 %";
      isFinished = false;
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function eraseAt(x, y) {
      if (isFinished) return;

      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.arc(x, y, eraseRadius, 0, Math.PI * 2);
      ctx.fill();

      scheduleProgressCheck();
    }

    function scheduleProgressCheck() {
      clearTimeout(checkTimer);

      checkTimer = setTimeout(() => {
        checkProgress();
      }, 100);
    }

    function checkProgress() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;

      let transparentPixels = 0;
      const totalPixels = canvas.width * canvas.height;

      for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] < 128) {
          transparentPixels++;
        }
      }

      const percentage = transparentPixels / totalPixels;
      const roundedPercentage = Math.floor(percentage * 100);

      statusText.textContent = "Freigelegt: " + roundedPercentage + " %";

      if (percentage >= 0.9) {
        revealWholeImage();
      }
    }

    function revealWholeImage() {
      isFinished = true;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      statusText.textContent = "Freigelegt: 100 %";
    }

    function resetGame() {
      setupCanvas();
    }

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      isDrawing = true;
      canvas.setPointerCapture(event.pointerId);

      const pos = getPointerPosition(event);
      eraseAt(pos.x, pos.y);
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!isDrawing) return;

      event.preventDefault();

      const pos = getPointerPosition(event);
      eraseAt(pos.x, pos.y);
    });

    canvas.addEventListener("pointerup", () => {
      isDrawing = false;
    });

    canvas.addEventListener("pointercancel", () => {
      isDrawing = false;
    });

    image.addEventListener("load", () => {
      setupCanvas();
    });

    window.addEventListener("resize", () => {
      setupCanvas();
    });

    if (image.complete) {
      setupCanvas();
    }
  </script>

</body>
</html>
