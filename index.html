<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Touch me - Uncolour</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
      color: #222;
      padding: 16px;
      overflow-x: hidden;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 1.8rem;
      text-align: center;
    }

    p {
      margin-top: 0;
      text-align: center;
    }

    .game-container {
      position: relative;
      width: min(90vw, 900px);
      max-height: 70vh;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      background: #ddd;
      touch-action: none;
      user-select: none;
    }

    .game-container img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain;
      pointer-events: none;
      background: #ddd;
    }

    #coverCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      font-size: 1.1rem;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 12px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #d00000;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #a80000;
    }

    button.secondary {
      background: #444;
    }

    button.secondary:hover {
      background: #222;
    }

    /* Pop-up */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }

    .modal-content {
      width: min(92vw, 520px);
      background: white;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
    }

    .modal-content h2 {
      margin-top: 0;
    }

    .modal-content input {
      margin: 16px 0;
      width: 100%;
      font-size: 1rem;
    }

    .hint {
      font-size: 0.95rem;
      color: #555;
    }

    .hidden {
      display: none;
    }

    /* Luftballon-Animation */
    #celebrationLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1000;
    }

    .balloon {
      position: absolute;
      bottom: -80px;
      font-size: 3rem;
      animation-name: floatUp;
      animation-duration: 3s;
      animation-timing-function: ease-out;
      animation-fill-mode: forwards;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.25));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      70% {
        opacity: 1;
      }

      100% {
        transform: translateY(-115vh) scale(1.2) rotate(12deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>Touch me - Uncolour</h1>
  <p>Wische über die rote Fläche, um das Bild freizulegen.</p>

  <div class="game-container" id="gameContainer">
    <img id="hiddenImage" src="" alt="Verstecktes Bild" />
    <canvas id="coverCanvas"></canvas>
  </div>

  <div id="status">Bitte zuerst Fotos auswählen.</div>

  <div class="buttons">
    <button onclick="resetCurrentImage()">Aktuelles Bild neu starten</button>
    <button onclick="showNextImage()">Nächstes Bild</button>
    <button class="secondary" onclick="openPhotoModal()">Neue Fotos auswählen</button>
  </div>

  <!-- Ebene für Luftballons -->
  <div id="celebrationLayer"></div>

  <!-- Pop-up zum Foto-Auswählen -->
  <div class="modal" id="photoModal">
    <div class="modal-content">
      <h2>Fotos auswählen</h2>

      <p>
        Wähle aus der Foto-Mediathek des iPads bis zu
        <strong>10 Fotos</strong> aus.
      </p>

      <input
        id="photoInput"
        type="file"
        accept="image/*"
        multiple
      />

      <p class="hint">
        Die Fotos werden nur lokal im Browser verwendet und nicht hochgeladen.
      </p>

      <button onclick="startWithSelectedPhotos()">Starten</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("coverCanvas");
    const ctx = canvas.getContext("2d");
    const image = document.getElementById("hiddenImage");
    const container = document.getElementById("gameContainer");
    const statusText = document.getElementById("status");
    const photoModal = document.getElementById("photoModal");
    const photoInput = document.getElementById("photoInput");
    const celebrationLayer = document.getElementById("celebrationLayer");

    let isDrawing = false;
    let isFinished = false;

    // Kleinere, weichere Spur
    let eraseRadius = 27;

    let checkTimer = null;
    let lastPosition = null;

    let photoUrls = [];
    let currentPhotoIndex = 0;

    function openPhotoModal() {
      photoModal.classList.remove("hidden");
    }

    function closePhotoModal() {
      photoModal.classList.add("hidden");
    }

    function startWithSelectedPhotos() {
      const files = Array.from(photoInput.files);

      if (files.length === 0) {
        alert("Bitte wähle mindestens ein Foto aus.");
        return;
      }

      if (files.length > 10) {
        alert("Bitte wähle höchstens 10 Fotos aus.");
        return;
      }

      photoUrls.forEach(url => URL.revokeObjectURL(url));

      photoUrls = files
        .filter(file => file.type.startsWith("image/"))
        .map(file => URL.createObjectURL(file));

      if (photoUrls.length === 0) {
        alert("Es wurden keine gültigen Bilddateien ausgewählt.");
        return;
      }

      shuffleArray(photoUrls);
      currentPhotoIndex = 0;

      closePhotoModal();
      loadCurrentImage();
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [array[i], array[randomIndex]] = [array[randomIndex], array[i]];
      }
    }

    function loadCurrentImage() {
      if (photoUrls.length === 0) {
        statusText.textContent = "Bitte zuerst Fotos auswählen.";
        return;
      }

      isFinished = false;
      lastPosition = null;
      image.src = photoUrls[currentPhotoIndex];

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length +
        " — Freigelegt: 0 %";
    }

    function setupCanvas() {
      const rect = container.getBoundingClientRect();

      if (rect.width === 0 || rect.height === 0) {
        return;
      }

      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "red";
      ctx.fillRect(0, 0, rect.width, rect.height);

      // Wichtig für weiche, natürliche Linien
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      isFinished = false;
      lastPosition = null;

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length +
        " — Freigelegt: 0 %";
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function eraseDot(x, y) {
      if (isFinished || photoUrls.length === 0) return;

      ctx.globalCompositeOperation = "destination-out";
      ctx.beginPath();
      ctx.arc(x, y, eraseRadius, 0, Math.PI * 2);
      ctx.fill();
    }

    function eraseLine(from, to) {
      if (isFinished || photoUrls.length === 0) return;

      ctx.globalCompositeOperation = "destination-out";
      ctx.lineWidth = eraseRadius * 2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();

      // Kleine runde Endpunkte verhindern harte Kanten
      eraseDot(to.x, to.y);
    }

    function handleEraseMove(event) {
      const events = event.getCoalescedEvents ? event.getCoalescedEvents() : [event];

      for (const singleEvent of events) {
        const currentPosition = getPointerPosition(singleEvent);

        if (!lastPosition) {
          eraseDot(currentPosition.x, currentPosition.y);
        } else {
          eraseLine(lastPosition, currentPosition);
        }

        lastPosition = currentPosition;
      }

      scheduleProgressCheck();
    }

    function scheduleProgressCheck() {
      clearTimeout(checkTimer);

      checkTimer = setTimeout(() => {
        checkProgress();
      }, 120);
    }

    function checkProgress() {
      if (canvas.width === 0 || canvas.height === 0) return;

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;

      let transparentPixels = 0;
      const totalPixels = canvas.width * canvas.height;

      for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] < 128) {
          transparentPixels++;
        }
      }

      const percentage = transparentPixels / totalPixels;
      const roundedPercentage = Math.floor(percentage * 100);

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length +
        " — Freigelegt: " + roundedPercentage + " %";

      if (percentage >= 0.9) {
        revealWholeImage();
      }
    }

    function revealWholeImage() {
      if (isFinished) return;

      isFinished = true;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length +
        " — Freigelegt: 100 %";

      startCelebration();
    }

    function startCelebration() {
      celebrationLayer.innerHTML = "";

      const balloons = ["🎈", "🎈", "🎈", "✨", "⭐", "🎉"];
      const numberOfBalloons = 18;

      for (let i = 0; i < numberOfBalloons; i++) {
        const balloon = document.createElement("div");

        balloon.className = "balloon";
        balloon.textContent = balloons[Math.floor(Math.random() * balloons.length)];

        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.animationDelay = Math.random() * 0.6 + "s";
        balloon.style.fontSize = 2.2 + Math.random() * 2.2 + "rem";

        celebrationLayer.appendChild(balloon);
      }

      setTimeout(() => {
        celebrationLayer.innerHTML = "";
      }, 3600);
    }

    function resetCurrentImage() {
      if (photoUrls.length === 0) {
        openPhotoModal();
        return;
      }

      celebrationLayer.innerHTML = "";
      setupCanvas();
    }

    function showNextImage() {
      if (photoUrls.length === 0) {
        openPhotoModal();
        return;
      }

      celebrationLayer.innerHTML = "";

      currentPhotoIndex++;

      if (currentPhotoIndex >= photoUrls.length) {
        currentPhotoIndex = 0;
        shuffleArray(photoUrls);
      }

      loadCurrentImage();
    }

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();

      if (photoUrls.length === 0) {
        openPhotoModal();
        return;
      }

      isDrawing = true;
      lastPosition = getPointerPosition(event);

      canvas.setPointerCapture(event.pointerId);

      eraseDot(lastPosition.x, lastPosition.y);
      scheduleProgressCheck();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!isDrawing) return;

      event.preventDefault();
      handleEraseMove(event);
    });

    canvas.addEventListener("pointerup", () => {
      isDrawing = false;
      lastPosition = null;
    });

    canvas.addEventListener("pointercancel", () => {
      isDrawing = false;
      lastPosition = null;
    });

    image.addEventListener("load", () => {
      setupCanvas();
    });

    window.addEventListener("resize", () => {
      if (photoUrls.length > 0) {
        setupCanvas();
      }
    });
  </script>

</body>
</html>
