<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>Touch me - Uncolour</title>

  <!-- App-ähnliche Darstellung auf iPad/iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Uncolour" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#d00000" />

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      background: #f2f2f2;
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: #222;

      padding-top: max(12px, env(safe-area-inset-top));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-left: max(12px, env(safe-area-inset-left));
    }

    .app-shell {
      width: 100%;
      height: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: clamp(1.25rem, 3.5vw, 2rem);
      text-align: center;
    }

    .subtitle {
      margin: 0 0 10px 0;
      text-align: center;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
    }

    .game-container {
      position: relative;
      width: min(92vw, 980px);
      max-height: 66dvh;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      background: #ddd;
      touch-action: none;
      user-select: none;
    }

    .game-container img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 66dvh;
      object-fit: contain;
      pointer-events: none;
      background: #ddd;
    }

    body.landscape .game-container {
      width: min(80vw, 1120px);
      max-height: 76dvh;
    }

    body.landscape .game-container img {
      max-height: 76dvh;
    }

    body.landscape .subtitle {
      display: none;
    }

    body.portrait .game-container {
      width: min(94vw, 900px);
      max-height: 62dvh;
    }

    body.portrait .game-container img {
      max-height: 62dvh;
    }

    #coverCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
    }

    #status {
      margin-top: 12px;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      min-height: 1.3em;
    }

    .progress-wrapper {
      width: min(92vw, 700px);
      margin-top: 8px;
      background: #e4e4e4;
      border-radius: 999px;
      overflow: hidden;
      height: 18px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.18);
    }

    #progressBar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ff3b3b, #c90000);
      border-radius: 999px;
      transition: width 0.18s linear;
    }

    button,
    input,
    label {
      touch-action: manipulation;
    }

    button {
      padding: 11px 17px;
      border: none;
      border-radius: 10px;
      background: #d00000;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
    }

    button:hover {
      background: #a80000;
    }

    .hidden {
      display: none !important;
    }

    /* Foto- und Einstellungsdialog */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
      touch-action: auto;
    }

    .modal-content {
      width: min(94vw, 560px);
      max-height: 92dvh;
      overflow-y: auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
      touch-action: auto;
    }

    .modal-content h2 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .modal-content input[type="file"] {
      margin: 14px 0;
      width: 100%;
      font-size: 1rem;
    }

    .settings-block {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: #f3f3f3;
      text-align: left;
    }

    .settings-block h3 {
      margin: 0 0 10px 0;
      text-align: center;
      font-size: 1.05rem;
    }

    .option-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .radio-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 11px;
      border-radius: 999px;
      background: white;
      border: 2px solid #ddd;
      font-weight: bold;
      cursor: pointer;
    }

    .radio-option input {
      accent-color: #d00000;
    }

    .hint {
      font-size: 0.95rem;
      color: #555;
    }

    /* Feier-Ebene */
    #celebrationLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1000;
    }

    .celebration-item {
      position: absolute;
      pointer-events: none;
      will-change: transform, opacity;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.25));
    }

    .float-up {
      bottom: -110px;
      animation-name: floatUp;
      animation-duration: 5s;
      animation-timing-function: ease-in-out;
      animation-fill-mode: forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(0.75) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      50% {
        transform: translateY(-55vh) translateX(22px) scale(1.05) rotate(6deg);
        opacity: 1;
      }

      85% {
        opacity: 1;
      }

      100% {
        transform: translateY(-115vh) translateX(-18px) scale(1.25) rotate(14deg);
        opacity: 0;
      }
    }

    .star-twinkle {
      animation-name: twinkle;
      animation-duration: 5s;
      animation-timing-function: ease-in-out;
      animation-fill-mode: forwards;
    }

    @keyframes twinkle {
      0% {
        transform: scale(0.2) rotate(0deg);
        opacity: 0;
      }

      15% {
        opacity: 1;
      }

      35% {
        transform: scale(1.3) rotate(90deg);
        opacity: 1;
      }

      60% {
        transform: scale(0.8) rotate(180deg);
        opacity: 0.6;
      }

      85% {
        opacity: 1;
      }

      100% {
        transform: scale(0.1) rotate(360deg);
        opacity: 0;
      }
    }

    .confetti {
      top: -70px;
      animation-name: confettiFall;
      animation-duration: 5s;
      animation-timing-function: ease-in;
      animation-fill-mode: forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      85% {
        opacity: 1;
      }

      100% {
        transform: translateY(115vh) translateX(40px) rotate(720deg);
        opacity: 0;
      }
    }

    .firework-particle {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      animation-name: firework;
      animation-duration: 5s;
      animation-timing-function: ease-out;
      animation-fill-mode: forwards;
    }

    @keyframes firework {
      0% {
        transform: translate(0, 0) scale(0.4);
        opacity: 0;
      }

      12% {
        opacity: 1;
      }

      45% {
        opacity: 1;
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.1);
        opacity: 0;
      }
    }

    #nextAfterSuccess {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 1500;
      padding: 14px 26px;
      font-size: 1.15rem;
      border-radius: 999px;
      background: #d00000;
      animation: popIn 0.35s ease-out;
    }

    @keyframes popIn {
      0% {
        transform: translateX(-50%) scale(0.75);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="app-shell">
    <h1>Touch me - Uncolour</h1>
    <p class="subtitle">Wische über die rote Fläche, um das Bild freizulegen.</p>

    <div class="game-container" id="gameContainer">
      <img id="hiddenImage" src="" alt="Verstecktes Bild" />
      <canvas id="coverCanvas"></canvas>
    </div>

    <div id="status">Bitte zuerst Fotos auswählen.</div>

    <div class="progress-wrapper" aria-label="Fortschritt">
      <div id="progressBar"></div>
    </div>
  </div>

  <button id="nextAfterSuccess" class="hidden" onclick="showNextImage()">
    Nächstes Bild
  </button>

  <div id="celebrationLayer"></div>

  <!-- Einziges Dialogfeld: Fotos + Einstellungen -->
  <div class="modal hidden" id="photoModal">
    <div class="modal-content">
      <h2>Fotos auswählen</h2>

      <p>
        Wähle aus der Foto-Mediathek des iPads bis zu
        <strong>10 Fotos</strong> aus.
      </p>

      <input
        id="photoInput"
        type="file"
        accept="image/*"
        multiple
      />

      <div class="settings-block">
        <h3>Pinselgröße</h3>

        <div class="option-grid">
          <label class="radio-option">
            <input type="radio" name="brushSize" value="small" />
            Klein
          </label>

          <label class="radio-option">
            <input type="radio" name="brushSize" value="medium" checked />
            Mittel
          </label>

          <label class="radio-option">
            <input type="radio" name="brushSize" value="large" />
            Groß
          </label>
        </div>
      </div>

      <div class="settings-block">
        <h3>Bild automatisch zeigen ab</h3>

        <div class="option-grid">
          <label class="radio-option">
            <input type="radio" name="revealThreshold" value="0.7" />
            70 %
          </label>

          <label class="radio-option">
            <input type="radio" name="revealThreshold" value="0.8" />
            80 %
          </label>

          <label class="radio-option">
            <input type="radio" name="revealThreshold" value="0.9" checked />
            90 %
          </label>
        </div>
      </div>

      <p class="hint">
        Die Fotos werden nur lokal im Browser verwendet und nicht hochgeladen.
      </p>

      <button onclick="startWithSelectedPhotos()">Starten</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("coverCanvas");
    const ctx = canvas.getContext("2d");

    const image = document.getElementById("hiddenImage");
    const container = document.getElementById("gameContainer");
    const statusText = document.getElementById("status");
    const progressBar = document.getElementById("progressBar");

    const photoModal = document.getElementById("photoModal");
    const photoInput = document.getElementById("photoInput");

    const celebrationLayer = document.getElementById("celebrationLayer");
    const nextAfterSuccess = document.getElementById("nextAfterSuccess");

    let isFinished = false;
    let eraseRadius = 26;
    let revealThreshold = 0.9;

    let checkTimer = null;
    let celebrationTimer = null;

    let photoUrls = [];
    let currentPhotoIndex = 0;

    const activePointers = new Map();

    let audioContext = null;
    let audioUnlocked = false;

    function openPhotoModal() {
      hideNextButton();
      photoModal.classList.remove("hidden");
    }

    function closePhotoModal() {
      photoModal.classList.add("hidden");
    }

    function applySettingsFromDialog() {
      const selectedBrush = document.querySelector('input[name="brushSize"]:checked').value;
      const selectedThreshold = document.querySelector('input[name="revealThreshold"]:checked').value;

      if (selectedBrush === "small") {
        eraseRadius = 18;
      }

      if (selectedBrush === "medium") {
        eraseRadius = 26;
      }

      if (selectedBrush === "large") {
        eraseRadius = 38;
      }

      revealThreshold = Number(selectedThreshold);
    }

    function startWithSelectedPhotos() {
      unlockAudio();
      applySettingsFromDialog();

      const files = Array.from(photoInput.files);

      if (files.length === 0) {
        alert("Bitte wähle mindestens ein Foto aus.");
        return;
      }

      if (files.length > 10) {
        alert("Bitte wähle höchstens 10 Fotos aus.");
        return;
      }

      photoUrls.forEach(url => URL.revokeObjectURL(url));

      photoUrls = files
        .filter(file => file.type.startsWith("image/"))
        .map(file => URL.createObjectURL(file));

      if (photoUrls.length === 0) {
        alert("Es wurden keine gültigen Bilddateien ausgewählt.");
        return;
      }

      shuffleArray(photoUrls);
      currentPhotoIndex = 0;

      closePhotoModal();
      hideNextButton();
      clearCelebration();
      loadCurrentImage();
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [array[i], array[randomIndex]] = [array[randomIndex], array[i]];
      }
    }

    function loadCurrentImage() {
      if (photoUrls.length === 0) {
        statusText.textContent = "Bitte zuerst Fotos auswählen.";
        progressBar.style.width = "100%";
        return;
      }

      isFinished = false;
      activePointers.clear();
      hideNextButton();
      clearCelebration();

      image.src = photoUrls[currentPhotoIndex];

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length;

      progressBar.style.width = "100%";
    }

    function setupCanvas() {
      const rect = container.getBoundingClientRect();

      if (rect.width === 0 || rect.height === 0) {
        return;
      }

      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "red";
      ctx.fillRect(0, 0, rect.width, rect.height);

      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      isFinished = false;
      activePointers.clear();

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length;

      progressBar.style.width = "100%";
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function eraseSoftCircle(x, y, radius) {
      if (isFinished || photoUrls.length === 0) return;

      ctx.globalCompositeOperation = "destination-out";

      const gradient = ctx.createRadialGradient(
        x,
        y,
        radius * 0.15,
        x,
        y,
        radius
      );

      gradient.addColorStop(0, "rgba(0, 0, 0, 1)");
      gradient.addColorStop(0.65, "rgba(0, 0, 0, 0.85)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function eraseAt(x, y) {
      // Leicht unregelmäßiger Rubbel-Effekt mit weichen Kanten
      eraseSoftCircle(x, y, eraseRadius * 0.86);

      const extraDots = 4;

      for (let i = 0; i < extraDots; i++) {
        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * eraseRadius * 0.65;
        const randomRadius = eraseRadius * (0.25 + Math.random() * 0.35);

        eraseSoftCircle(
          x + Math.cos(angle) * distance,
          y + Math.sin(angle) * distance,
          randomRadius
        );
      }
    }

    function eraseBetween(from, to) {
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const distance = Math.hypot(dx, dy);

      const step = Math.max(4, eraseRadius * 0.35);
      const steps = Math.max(1, Math.ceil(distance / step));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = from.x + dx * t;
        const y = from.y + dy * t;

        eraseAt(x, y);
      }
    }

    function handlePointerMove(event) {
      const pointerId = event.pointerId;
      const previousPosition = activePointers.get(pointerId);

      if (!previousPosition) return;

      const events = event.getCoalescedEvents
        ? event.getCoalescedEvents()
        : [event];

      let lastKnownPosition = previousPosition;

      for (const singleEvent of events) {
        const currentPosition = getPointerPosition(singleEvent);
        eraseBetween(lastKnownPosition, currentPosition);
        lastKnownPosition = currentPosition;
      }

      activePointers.set(pointerId, lastKnownPosition);
      scheduleProgressCheck();
    }

    function scheduleProgressCheck() {
      clearTimeout(checkTimer);

      checkTimer = setTimeout(() => {
        checkProgress();
      }, 120);
    }

    function checkProgress() {
      if (canvas.width === 0 || canvas.height === 0) return;

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imageData.data;

      let transparentPixels = 0;
      const totalPixels = canvas.width * canvas.height;

      for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] < 128) {
          transparentPixels++;
        }
      }

      const uncovered = transparentPixels / totalPixels;
      const remaining = Math.max(0, 1 - uncovered);

      progressBar.style.width = (remaining * 100) + "%";

      if (uncovered >= revealThreshold) {
        revealWholeImage();
      }
    }

    function revealWholeImage() {
      if (isFinished) return;

      isFinished = true;
      activePointers.clear();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      progressBar.style.width = "0%";

      statusText.textContent =
        "Bild " + (currentPhotoIndex + 1) + " von " + photoUrls.length +
        " geschafft!";

      playSuccessSound();
      startRandomCelebration();
    }

    function startRandomCelebration() {
      clearCelebration();
      hideNextButton();

      const animations = [
        "balloons",
        "stars",
        "confetti",
        "bubbles",
        "fireworks",
        "smileys"
      ];

      const selectedAnimation =
        animations[Math.floor(Math.random() * animations.length)];

      if (selectedAnimation === "balloons") {
        createFloatingEmojis(["🎈", "🎈", "🎈", "🎉"], 24);
      }

      if (selectedAnimation === "stars") {
        createStars();
      }

      if (selectedAnimation === "confetti") {
        createConfetti();
      }

      if (selectedAnimation === "bubbles") {
        createFloatingEmojis(["🫧", "○", "◌"], 28);
      }

      if (selectedAnimation === "fireworks") {
        createFireworks();
      }

      if (selectedAnimation === "smileys") {
        createFloatingEmojis(["😀", "😄", "😊", "🥳", "🤩"], 24);
      }

      celebrationTimer = setTimeout(() => {
        clearCelebration();
        showNextButton();
      }, 5000);
    }

    function createFloatingEmojis(symbols, count) {
      for (let i = 0; i < count; i++) {
        const item = document.createElement("div");

        item.className = "celebration-item float-up";
        item.textContent = symbols[Math.floor(Math.random() * symbols.length)];

        item.style.left = Math.random() * 100 + "vw";
        item.style.animationDelay = Math.random() * 0.8 + "s";
        item.style.fontSize = 2 + Math.random() * 2.4 + "rem";

        celebrationLayer.appendChild(item);
      }
    }

    function createStars() {
      const symbols = ["⭐", "✨", "🌟", "✦", "✧"];

      for (let i = 0; i < 32; i++) {
        const item = document.createElement("div");

        item.className = "celebration-item star-twinkle";
        item.textContent = symbols[Math.floor(Math.random() * symbols.length)];

        item.style.left = Math.random() * 100 + "vw";
        item.style.top = Math.random() * 90 + "vh";
        item.style.animationDelay = Math.random() * 1.2 + "s";
        item.style.fontSize = 1.6 + Math.random() * 2.4 + "rem";

        celebrationLayer.appendChild(item);
      }
    }

    function createConfetti() {
      const colors = [
        "#ff3b3b",
        "#ffd60a",
        "#34c759",
        "#007aff",
        "#af52de",
        "#ff9500"
      ];

      for (let i = 0; i < 80; i++) {
        const item = document.createElement("div");

        item.className = "celebration-item confetti";

        item.style.left = Math.random() * 100 + "vw";
        item.style.animationDelay = Math.random() * 1 + "s";
        item.style.width = 8 + Math.random() * 10 + "px";
        item.style.height = 12 + Math.random() * 16 + "px";
        item.style.background = colors[Math.floor(Math.random() * colors.length)];
        item.style.borderRadius = Math.random() > 0.5 ? "2px" : "999px";

        celebrationLayer.appendChild(item);
      }
    }

    function createFireworks() {
      const colors = [
        "#ff3b3b",
        "#ffd60a",
        "#34c759",
        "#007aff",
        "#af52de",
        "#ffffff"
      ];

      for (let burst = 0; burst < 5; burst++) {
        const centerX = 15 + Math.random() * 70;
        const centerY = 18 + Math.random() * 42;

        for (let i = 0; i < 26; i++) {
          const item = document.createElement("div");

          item.className = "celebration-item firework-particle";

          const angle = (Math.PI * 2 * i) / 26;
          const distance = 80 + Math.random() * 120;

          item.style.left = centerX + "vw";
          item.style.top = centerY + "vh";
          item.style.background = colors[Math.floor(Math.random() * colors.length)];
          item.style.animationDelay = (burst * 0.45 + Math.random() * 0.25) + "s";
          item.style.setProperty("--dx", Math.cos(angle) * distance + "px");
          item.style.setProperty("--dy", Math.sin(angle) * distance + "px");

          celebrationLayer.appendChild(item);
        }
      }
    }

    function clearCelebration() {
      clearTimeout(celebrationTimer);
      celebrationLayer.innerHTML = "";
    }

    function showNextButton() {
      if (photoUrls.length > 0 && isFinished) {
        nextAfterSuccess.classList.remove("hidden");
      }
    }

    function hideNextButton() {
      nextAfterSuccess.classList.add("hidden");
    }

    function showNextImage() {
      unlockAudio();

      if (photoUrls.length === 0) {
        openPhotoModal();
        return;
      }

      hideNextButton();
      clearCelebration();

      currentPhotoIndex++;

      if (currentPhotoIndex >= photoUrls.length) {
        currentPhotoIndex = 0;
        shuffleArray(photoUrls);
      }

      loadCurrentImage();
    }

    function unlockAudio() {
      if (audioUnlocked) return;

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) return;

      audioContext = audioContext || new AudioContextClass();

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      audioUnlocked = true;
    }

    function playSuccessSound() {
      if (!audioContext || !audioUnlocked) return;

      const now = audioContext.currentTime;

      playTone(523.25, now, 0.09);
      playTone(659.25, now + 0.09, 0.09);
      playTone(783.99, now + 0.18, 0.16);
    }

    function playTone(frequency, startTime, duration) {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(frequency, startTime);

      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.18, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }

    function updateOrientation() {
      const isLandscape = window.innerWidth > window.innerHeight;

      document.body.classList.toggle("landscape", isLandscape);
      document.body.classList.toggle("portrait", !isLandscape);
    }

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      unlockAudio();

      if (photoUrls.length === 0) {
        openPhotoModal();
        return;
      }

      if (isFinished) return;

      const position = getPointerPosition(event);

      activePointers.set(event.pointerId, position);
      canvas.setPointerCapture(event.pointerId);

      eraseAt(position.x, position.y);
      scheduleProgressCheck();
    });

    canvas.addEventListener("pointermove", (event) => {
      event.preventDefault();

      if (isFinished) return;

      handlePointerMove(event);
    });

    canvas.addEventListener("pointerup", (event) => {
      activePointers.delete(event.pointerId);
    });

    canvas.addEventListener("pointercancel", (event) => {
      activePointers.delete(event.pointerId);
    });

    image.addEventListener("load", () => {
      setupCanvas();
    });

    window.addEventListener("resize", () => {
      updateOrientation();

      if (photoUrls.length > 0 && !isFinished) {
        setTimeout(setupCanvas, 120);
      }
    });

    window.addEventListener("orientationchange", () => {
      updateOrientation();

      if (photoUrls.length > 0 && !isFinished) {
        setTimeout(setupCanvas, 350);
      }
    });

    window.addEventListener("load", () => {
      updateOrientation();
      openPhotoModal();
    });

    // Schutz gegen versehentliches Zoomen auf iPad/iPhone
    document.addEventListener("gesturestart", function(event) {
      event.preventDefault();
    });

    document.addEventListener("gesturechange", function(event) {
      event.preventDefault();
    });

    document.addEventListener("gestureend", function(event) {
      event.preventDefault();
    });

    let lastTouchEnd = 0;

    document.addEventListener("touchend", function(event) {
      const now = Date.now();

      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }

      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("dblclick", function(event) {
      event.preventDefault();
    });
  </script>

</body>
</html>
